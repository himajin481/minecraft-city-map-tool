<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Minecraft 都市地図エディター</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#101319;color:#e7ebf2;font-family:system-ui,sans-serif}
    main{width:min(680px,calc(100% - 32px));padding:32px;border:1px solid #303848;border-radius:16px;background:#171b23}
    h1{margin-top:0}.versions{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:24px}
    a{display:block;padding:20px;border:1px solid #3c4659;border-radius:12px;background:#202633;color:#fff;text-decoration:none}
    a:hover{border-color:#58a6ff;background:#173b61}strong{display:block;font-size:22px;margin-bottom:6px}.latest{color:#7fc3ff}
    p{color:#aeb8c8;line-height:1.7}
  </style>
</head>
<body>
<main>
  <h1>Minecraft 都市地図エディター</h1>
  <p>使用するバージョンを選択してください。各バージョンは独立しているため、最新版公開後も以前の版を利用できます。</p>
  <div class="versions">
    <a href="v1.2/"><strong>v1.2 <span class="latest">最新版</span></strong>矩形選択とID重複の不具合を修正</a>
    <a href="v1.1/"><strong>v1.1</strong>地図Y軸とMinecraft Z軸の反転に対応</a>
    <a href="v1.0/"><strong>v1.0</strong>初回公開版</a>
  </div>
</main>
</body>
</html>
